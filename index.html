<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego: ¿Cuánto te quiero Fátima?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-pink-500 via-purple-600 to-blue-400 text-white min-h-screen flex items-center justify-center">

<div id="start-screen" class="text-center">
    <h1 class="text-3xl font-bold mb-5">¡Bienvenida Fátima! ❤️</h1>
    <button id="start-btn" class="px-6 py-3 bg-white/20 rounded-xl">Empezar</button>
</div>

<div id="game-screen" class="hidden text-center">
    <div id="lives" class="mb-4">❤️❤️❤️</div>
    <h2 id="question-title"></h2>
    <p id="question-text" class="mb-4"></p>
    <div id="options-container"></div>
    <div id="feedback" class="hidden mt-3"></div>
    <button id="next-btn" class="hidden mt-4 bg-white/20 px-4 py-2 rounded">Siguiente</button>
</div>

<div id="lose-screen" class="hidden text-center">
    <h2 class="text-2xl mb-4">Perdiste 😢</h2>
    <button id="restart-btn-lose" class="bg-white/20 px-4 py-2 rounded">Reintentar</button>
</div>

<div id="final-screen" class="hidden text-center">
    <h2 class="text-2xl mb-4">¡Lo lograste! ❤️</h2>
    <p>Te quiero más que todo en el universo 💖</p>
</div>

<script>
const questions = [
    {
        title: "Nivel 1",
        text: "¿Cuánto te quiero?",
        options: ["Poquito", "Mucho", "Inmensamente", "Más allá de las estrellas"],
        correctIndex: 3
    },
    {
        title: "Nivel 2",
        text: "¿Qué eres para mí?",
        options: ["Amiga", "Especial", "Amor", "Mi mundo"],
        correctIndex: 3
    }
];

let currentQuestion = 0;
let lives = 3;
let answered = false;

document.getElementById('start-btn').onclick = () => {
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    loadQuestion();
};

document.getElementById('restart-btn-lose').onclick = () => {
    lives = 3;
    currentQuestion = 0;
    document.getElementById('lose-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    loadQuestion();
};

document.getElementById('next-btn').onclick = () => {
    currentQuestion++;
    loadQuestion();
};

function loadQuestion() {
    answered = false;
    document.getElementById('feedback').classList.add('hidden');
    document.getElementById('next-btn').classList.add('hidden');

    const q = questions[currentQuestion];

    document.getElementById('question-title').textContent = q.title;
    document.getElementById('question-text').textContent = q.text;

    const container = document.getElementById('options-container');
    container.innerHTML = '';

    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.textContent = opt;
        btn.className = "block w-full mb-2 bg-white/20 p-2 rounded";
        btn.onclick = () => checkAnswer(i);
        container.appendChild(btn);
    });

    updateLives();
}

function checkAnswer(index) {
    if (answered) return;
    answered = true;

    const q = questions[currentQuestion];
    const feedback = document.getElementById('feedback');

    if (index === q.correctIndex) {
        feedback.textContent = "Correcto 💖";
        
        if (currentQuestion === questions.length - 1) {
            setTimeout(() => {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('final-screen').classList.remove('hidden');
            }, 1000);
        } else {
            document.getElementById('next-btn').classList.remove('hidden');
        }
    } else {
        feedback.textContent = "Incorrecto 😢";
        lives--;
        updateLives();

        if (lives <= 0) {
            setTimeout(() => {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('lose-screen').classList.remove('hidden');
            }, 1000);
        } else {
            document.getElementById('next-btn').classList.remove('hidden');
        }
    }

    feedback.classList.remove('hidden');
}

function updateLives() {
    document.getElementById('lives').textContent = "❤️".repeat(lives);
}
</script>

</body>
</html>
